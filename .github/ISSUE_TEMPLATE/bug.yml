name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not disclose vulnerabilities or credentials here. Use the security policy.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Include the branch, release, or full commit SHA.
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Windows
        - Linux
        - macOS
        - GitHub Actions
        - Azure
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest repeatable sequence and sanitized logs.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation attempted
      description: List diagnostics, tests, or workarounds already attempted.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: I removed credentials, personal data, proprietary code, and sensitive prompts.
          required: true
        - label: This is not a security vulnerability.
          required: true
