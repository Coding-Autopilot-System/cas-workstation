name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Install validation modules
        shell: pwsh
        run: |
          Install-Module Pester -RequiredVersion 5.7.1 -Force -SkipPublisherCheck
          Install-Module PSScriptAnalyzer -RequiredVersion 1.24.0 -Force
      - name: Validate contracts and static quality
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.json | ForEach-Object { Get-Content -Raw $_.FullName | ConvertFrom-Json | Out-Null }
          Get-Content -Raw stack.manifest.json | Test-Json -SchemaFile schemas/manifest.schema.json
          Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error
      - name: Run Pester on PowerShell 7
        shell: pwsh
        run: Invoke-Pester -Path tests -CI
      - name: Run Pester on Windows PowerShell 5.1
        shell: powershell
        run: Invoke-Pester -Path tests -CI
      - name: Validate doctor output
        shell: pwsh
        run: |
          .\doctor.ps1 -Profile core -RootPath "$env:RUNNER_TEMP\cas-root" -ConfigPath "$env:RUNNER_TEMP\cas-config" -JsonPath "$env:RUNNER_TEMP\doctor.json"
          Get-Content -Raw "$env:RUNNER_TEMP\doctor.json" | Test-Json -SchemaFile schemas/doctor.schema.json